services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:5173"
    environment:
      # Reliable file watching on Windows/macOS bind mounts
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - USE_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  web-prod:
    profiles: ["prod"]
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
